# ---------------------------------------------------------------------------
# DataSource - MariaDB
# ---------------------------------------------------------------------------
quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=${DB_USER:pixelchat}
quarkus.datasource.password=${DB_PASSWORD:michat792}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mariadb://localhost:3306/pixelchat}

# ---------------------------------------------------------------------------
# Hibernate/Liquibase
# ---------------------------------------------------------------------------
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changeLog.xml

# ---------------------------------------------------------------------------
# Dev mode overrides  (solo se aplican con ./gradlew quarkusDev)
# ---------------------------------------------------------------------------
#%dev.quarkus.hibernate-orm.log.sql=true
#%dev.quarkus.hibernate-orm.log.format-sql=true

# ---------------------------------------------------------------------------
# Internal service-to-service secret
# ---------------------------------------------------------------------------
internal.secret=${INTERNAL_SECRET:dev-internal-secret}

# ---------------------------------------------------------------------------
# App / Frontend URL (para construir enlaces en emails)
# ---------------------------------------------------------------------------
app.url=${APP_URL:http://localhost:5173}

# ---------------------------------------------------------------------------
# Mailer (Mailgun SMTP)
# ---------------------------------------------------------------------------
quarkus.mailer.from=${MAIL_FROM:PixelChat <noreply@pixelchat.es>}
quarkus.mailer.host=smtp.eu.mailgun.org
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAILGUN_SMTP_USER:user}
quarkus.mailer.password=${MAILGUN_SMTP_PASSWORD:password}
quarkus.mailer.mock=false

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.access-control-allow-credentials=true

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
mp.jwt.verify.issuer=${JWT_ISSUER:pixelchat}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH:publicKey.pem}
smallrye.jwt.new-token.issuer=${JWT_ISSUER:pixelchat}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_PATH:privateKey.pem}

# Desactiva la autenticación proactiva: Quarkus solo valida el JWT cuando el
# endpoint lo requiere (@Authenticated/@RolesAllowed). Sin esto, un token
# expirado enviado en el header causa 401 incluso en endpoints públicos.
quarkus.http.auth.proactive=false

quarkus.http.host=0.0.0.0
